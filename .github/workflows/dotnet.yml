# This workflow will build and test a .NET project
# هذا الـ Workflow يقوم ببناء مشروع .NET وتشغيل الاختبارات

name: .NET

on:
  push:
    branches: [ "master" ]   # Run workflow on push to master
                             # تشغيل الـ Workflow عند حدوث push على فرع master
  pull_request:
    branches: [ "master" ]   # Run workflow on pull request to master
                             # تشغيل الـ Workflow عند حدوث pull request على فرع master

jobs:
  build:
    runs-on: windows-latest   # Use Ubuntu server to run the job
                             # استخدام سيرفر Ubuntu لتشغيل الـ Job

    steps:
    - uses: actions/checkout@v4   # Checkout project files
                                  # تحميل ملفات المشروع من GitHub

    - name: Install Visual Studio Build Tools
      uses: microsoft/setup-msbuild@v2   # Install MSBuild + WebApplication targets
                                         # تثبيت أدوات Visual Studio الضرورية لبناء مشاريع WebApplication القديمة

    - name: Restore dependencies
      run: nuget restore Vidly.sln       # Restore NuGet packages
                                         # استعادة الحزم المطلوبة للمشروع باستخدام NuGet (وليس dotnet restore)

    - name: Build
      run: msbuild Vidly/Vidly.csproj /p:Configuration=Release   # Build project using MSBuild
                                                            # بناء المشروع باستخدام MSBuild لأنه يدعم مشاريع MVC5/WebForms
    - name: Run Tests
      run: |
        vstest.console.exe Vidly.Tests\bin\Release\Vidly.Tests.dll   # Run test DLL
                                                                     # تشغيل الاختبارات باستخدام VSTest
