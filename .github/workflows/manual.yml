# This is a basic workflow that is manually triggered
# هذا Workflow بسيط يتم تشغيله يدويًا
name: manual-input-workflow

# Controls when the action will run. Workflow runs when manually triggered using the UI or API.
# يتحكم في وقت تشغيل الـ Workflow — يتم تشغيله يدويًا من خلال واجهة GitHub أو عبر الـ API
on:
  workflow_dispatch:
    # Inputs the workflow accepts.
    # المدخلات التي يقبلها الـ Workflow
    inputs:
      name:
        # Friendly description to be shown in the UI instead of 'name'
        # وصف يظهر للمستخدم بدلًا من اسم المتغير "name"
        description: 'Person to greet / الشخص الذي سيتم تحيته'
        # Default value if no value is explicitly provided
        # القيمة الافتراضية إذا لم يكتب المستخدم قيمة
        default: 'World'
        # Input has to be provided for the workflow to run
        # يجب إدخال قيمة حتى يعمل الـ Workflow
        required: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
# تشغيل الـ Workflow يتكون من Job واحد أو أكثر يمكن تشغيلها بالتسلسل أو بالتوازي
jobs:
  # This workflow contains a single job called "greet"
  # هذا الـ Workflow يحتوي على Job واحد اسمه "greet"
  greet:
    # The type of runner that the job will run on
    # نوع السيرفر الذي سيعمل عليه الـ Job
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    # الخطوات التي سيتم تنفيذها داخل الـ Job
    steps:
      # Runs a single command using the runner's shell
      # تنفيذ أمر واحد باستخدام الـ Shell الخاص بالسيرفر
      - name: Send greeting / إرسال التحية
        run: echo "Hello ${{ github.event.inputs.name }}"
